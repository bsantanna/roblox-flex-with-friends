name: Deploy (staging)

# Publishes the built place to a STAGING Open Cloud universe on every merge to main.
# Inert until configured: set repository variables ROBLOX_UNIVERSE_ID and ROBLOX_PLACE_ID,
# and secret ROBLOX_API_KEY (an Open Cloud API key with universe-places:write on that place).
# Until those exist the job runs, detects the missing config, and skips with a notice.

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Open Cloud configuration
        id: cfg
        env:
          API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          UNIVERSE_ID: ${{ vars.ROBLOX_UNIVERSE_ID }}
          PLACE_ID: ${{ vars.ROBLOX_PLACE_ID }}
        run: |
          if [ -n "$API_KEY" ] && [ -n "$UNIVERSE_ID" ] && [ -n "$PLACE_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Open Cloud not configured (ROBLOX_API_KEY / ROBLOX_UNIVERSE_ID / ROBLOX_PLACE_ID); skipping staging deploy."
          fi

      - name: Install toolchain (Rokit)
        if: steps.cfg.outputs.configured == 'true'
        uses: CompeyDev/setup-rokit@v0.2.1

      - name: Install dependencies (Wally)
        if: steps.cfg.outputs.configured == 'true'
        run: wally install

      - name: Build place
        if: steps.cfg.outputs.configured == 'true'
        run: make build

      - name: Publish to staging (Open Cloud)
        if: steps.cfg.outputs.configured == 'true'
        run: |
          rbxcloud experience publish \
            --filename build.rbxl \
            --place-id ${{ vars.ROBLOX_PLACE_ID }} \
            --universe-id ${{ vars.ROBLOX_UNIVERSE_ID }} \
            --version-type published \
            --api-key ${{ secrets.ROBLOX_API_KEY }}
